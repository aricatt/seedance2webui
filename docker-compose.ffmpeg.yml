# FFmpeg 工具容器：与 seedance Node 进程分离，供首帧截图等能力通过 `docker exec` 调用。
# 镜像：https://hub.docker.com/r/jrottenberg/ffmpeg/tags
# 开发：`dev.ps1` 会 `docker compose -f docker-compose.ffmpeg.yml up -d`
# 停止：`docker compose -f docker-compose.ffmpeg.yml down`
#
# 默认挂载项目下 temp_ffmpeg -> 容器内 /temp（读写对齐宿主机，便于 docker exec 输出文件）
# 示例：
#   docker exec modeltoosd-ffmpeg-tools ffmpeg -y -ss 0 -i "https://..." -vframes 1 -q:v 2 /temp/poster.jpg

services:
  ffmpeg-tools:
    image: jrottenberg/ffmpeg:7.1-alpine320
    container_name: modeltoosd-ffmpeg-tools
    # 镜像默认 entrypoint 为 ffmpeg；改为常驻 shell，便于反复 exec 调用 ffmpeg
    entrypoint: ["/bin/sh", "-c"]
    # 勿用 sleep infinity：Alpine/BusyBox 常不支持；用循环 sleep 常驻
    command: ["while true; do sleep 3600; done"]
    volumes:
      - ./temp_ffmpeg:/temp
    restart: unless-stopped
